<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">イーブイ進化系 - TCGカード | ポケモン シティ</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="header">
        <h1 data-i18n="title">✨ イーブイ進化系 TCG ✨</h1>
        <p data-i18n="subtitle">テラスタルフェスト EX SAR コレクション - ポケモン シティ</p>
        
        <div class="controls">
            <div class="language-switch">
                <button class="language-btn" data-lang="ja">🇯🇵 日本語</button>
                <button class="language-btn" data-lang="en">🇺🇸 English</button>
                <button class="language-btn" data-lang="es">🇪🇸 Español</button>
            </div>
            <label class="toggle">
                <input type="checkbox" id="fanNameToggle">
                <span data-i18n="toggle">ファンネームを表示</span>
            </label>
        </div>
    </div>

    <div class="cards-container" id="cardsContainer">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <div class="footer">
        <p data-i18n="footer">© ポケモン シティ - テラスタルフェスト EX SAR コレクション</p>
        <p>イーブイ進化系 TCG 公式カードコレクション</p>
        <p>カードをクリックしてターン 💳✨</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
