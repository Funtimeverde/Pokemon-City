<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Eeveelutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>✨ Pokémon TCG Eeveelutions ✨</h1>
        <p>Cartas interactivas de Eeveelutions</p>
    </header>

    <div class="controls">
        <div class="language-switch">
            <button class="language-btn" data-lang="ja">日本語</button>
            <button class="language-btn" data-lang="en">EN</button>
            <button class="language-btn active" data-lang="es">ES</button>
        </div>

        <label class="toggle">
            <input id="fanNameToggle" type="checkbox">
            <span>Mostrar fan names</span>
        </label>
    </div>

    <main id="cardsContainer" class="cards-container"></main>

    <footer class="footer">
        <p>© Pokémon City - Eeveelutions TCG</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
